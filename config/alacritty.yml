env:
  TERM: xterm-256color

window:
  dimensions:
    columns: 140
    lines: 40

  padding:
    x: 5
    y: 5

  dynamic_padding: true
  decorations: full
  title: Alacritty
  dynamic_title: false

scrolling:
  history: 10000
  multiplier: 3

font:
  normal:
    family: CaskaydiaCove Nerd Font Mono
    style: Medium

  bold:
    family: CaskaydiaCove Nerd Font Mono
    style: Bold

  italic:
    family: CaskaydiaCove Nerd Font Mono
    style: Italic

  size: 13.0

  offset:
    x: 0
    y: 0

background_opacity: 1
draw_bold_text_with_bright_colors: false
cursor:
  # Cursor style
  #
  # Values for 'style':
  #   - ▇ Block
  #   - _ Underline
  #   - | Beam
  style: Block
  blinking: Off
  blink_interval: 0
  # If this is `true`, the cursor will be rendered as a hollow box when the
  # window is not focused.
  unfocused_hollow: true

shell:
  program: /usr/bin/zsh

# Colors (Tomorrow Night Bright)
colors:
  # Default colors
  primary:
    background: '#2d2d2d'
    foreground: '#cccccc'

  # Normal colors
  normal:
    black:   '#000000'
    red:     '#F27779'
    green:   '#99CC99'
    yellow:  '#FFCC66'
    blue:    '#6699CC'
    magenta: '#CC99CC'
    cyan:    '#66CCCC'
    white:   '#FFFEFE'

  # Bright colors
  bright:
    black:   '#555753'
    red:     '#F27779'
    green:   '#99CC99'
    yellow:  '#FFCC66'
    blue:    '#6699CC'
    magenta: '#CC99CC'
    cyan:    '#66CCCC'
    white:   '#FFFEFE'
