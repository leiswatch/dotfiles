# Plugins
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-sensible'
set -g @plugin 'tmux-plugins/tmux-resurrect'
set -g @plugin 'tmux-plugins/tmux-continuum'
set -g @plugin 'tmux-plugins/tmux-pain-control'
set -g @plugin 'tmux-plugins/tmux-sessionist'
set -g @plugin 'tmux-plugins/tmux-yank'
set -g @plugin 'tmux-plugins/tmux-open'
set -g @plugin 'tmux-plugins/tmux-copycat'

set-option -g prefix C-a
bind-key C-a send-prefix

bind C-p previous-window
bind C-n next-window
bind C-o switch-client -n
bind C-i switch-client -p

set -g mouse on
set -g base-index 1
set -g allow-rename off
setw -g pane-base-index 1
set -g @yank_with_mouse on

# Undercurl
# set -g default-terminal "${TERM}"
# set -as terminal-overrides ',*:Smulx=\E[4::%p1%dm'  # undercurl support
# set -as terminal-overrides ',*:Setulc=\E[58::2::%p1%{65536}%/%d::%p1%{256}%/%{255}%&%d::%p1%{255}%&%d%;m'  # underscore colours - needs tmux-3.0

set -g default-terminal "tmux-256color"

set-option -gas terminal-overrides "*:Tc" # true color support
set-option -gas terminal-overrides "*:RGB" # true color support
set -as terminal-overrides ',*:Smulx=\E[4::%p1%dm'  # undercurl support
set -as terminal-overrides ',*:Setulc=\E[58::2::%p1%{65536}%/%d::%p1%{256}%/%{255}%&%d::%p1%{255}%&%d%;m'  # underscore colours - needs tmux-3.0

set -g @continuum-restore 'on'

setw -g history-limit 50000000

# Catppuccin Mocha
thm_bg="#1e1e2e"
thm_fg="#cdd6f4"
thm_black="#11111b"
thm_cyan="#89dceb"
thm_gray="#313244"
thm_magenta="#cba6f7"
thm_pink="#f5c2e7"
thm_red="#f38ba8"
thm_green="#a6e3a1"
thm_yellow="#f9e2af"
thm_blue="#89b4fa"
thm_orange="#fab387"

set -g status-position bottom
set -g status "on"
set -g status-bg "${thm_black}"
set -g status-justify "left"
set -g status-left-length "100"
set -g status-right-length "100"

set -g message-style fg="${thm_pink}",bg="${thm_black}",align="centre"
set -g message-command-style fg="${thm_blue}",bg="${thm_black}",align="centre"

set -g pane-border-style fg="${thm_gray}"
set -g pane-active-border-style fg="${thm_blue}"

setw -g window-status-activity-style fg="${thm_fg}",bg="${thm_black}",none
setw -g window-status-separator ""
setw -g window-status-style fg="${thm_fg}",bg="${thm_black}",none

set -g status-left "#{?client_prefix,#[bg=$thm_red],#[bg=$thm_cyan]}#[fg=$thm_black] #{?client_prefix,#[bg=$thm_red],#[bg=$thm_cyan]}#[fg=$thm_black] #S "
# set -g status-right "#[fg=$thm_black,bg=$thm_yellow]  #(echo '#{pane_current_path}' | rev | cut -d'/' -f-2 | rev) #[fg=$thm_black,bg=$thm_black] #[fg=$thm_black,bg=$thm_magenta]  %a %b %d %Y, %H:%M "
#set -g status-right "#[fg=$thm_black,bg=$thm_black] #[fg=$thm_black,bg=$thm_magenta]  %b %d %Y, %H:%M "
set -g status-right "#[fg=$thm_black,bg=$thm_magenta]  #(echo '#{pane_current_path}' | rev | cut -d'/' -f-2 | rev) "

setw -g window-status-format " #[fg=$thm_black,bg=$thm_blue]  #I:#[fg=$thm_black,bg=$thm_blue]#W "
setw -g window-status-current-format " #[fg=$thm_black,bg=$thm_orange]  #I:#[fg=$thm_black,bg=$thm_orange]#W "

setw -g clock-mode-colour "${thm_blue}"
setw -g mode-style "fg=${thm_orange} bg=${thm_black} bold"

run -b '~/.tmux/plugins/tpm/tpm'
