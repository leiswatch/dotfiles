import = ["/home/leiswatch/.config/alacritty/catppuccin/catppuccin-mocha.toml"]

[window]
dimensions = { columns = 120, lines = 30 }
padding = { x = 5, y = 5 }
opacity = 0.98
blur = false
startup_mode = "Windowed"

[scrolling]
history = 99999

[font]
normal = { family = "JetBrains Mono", style = "Medium" }
bold = { family = "JetBrains Mono", style = "Bold" }
italic = { family = "JetBrains Mono", style = "Medium Italic" }
bold_italic = { family = "JetBrains Mono", style = "Bold Italic" }
offset = { x = 0, y = 0 }
glyph_offset = { x = 0, y = 0 }
size = 13

[cursor]
style = { shape = "Block", blinking = "Never" }

[mouse]
hide_when_typing = true
