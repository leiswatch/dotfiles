env:
  TERM: xterm-256color

window:
  dimensions:
    columns: 140
    lines: 40
  padding:
    x: 10
    y: 10

  dynamic_padding: false
  decorations: full
  title: Alacritty
  dynamic_title: false
  opacity: 0.96

scrolling:
  history: 10000
  multiplier: 3

font:
  normal:
    family: JetBrains Mono NL
    style: Medium

  bold:
    family: JetBrains Mono NL
    style: Bold

  italic:
    family: JetBrains Mono NL
    style: Italic

  size: 12

  offset:
    x: 0
    y: 0

draw_bold_text_with_bright_colors: true
cursor:
  style: Block
  blinking: Off
  blink_interval: 0
  unfocused_hollow: true
  custom_cursor_colors: true

# Catppuccin!
colors:
  # Default colors
  primary:
    background: '#1E1E28'
    foreground: '#DADAE8'

  # Colors the cursor will use if `custom_cursor_colors` is true
  cursor:
    text: '#1E1E28'
    cursor: '#B1E3AD'

  # Normal colors
  normal:
    black:   '#6E6C7E'
    red:     '#E38C8F'
    green:   '#B1E3AD'
    yellow:  '#EBDDAA'
    blue:    '#A4B9EF'
    magenta: '#C6AAE8'
    cyan:    '#E5B4E2'
    white:   '#DADAE8'

  # Bright colors
  bright:
    black:   '#6E6C7E'
    red:     '#E38C8F'
    green:   '#B1E3AD'
    yellow:  '#EBDDAA'
    blue:    '#A4B9EF'
    magenta: '#C6AAE8'
    cyan:    '#E5B4E2'
    white:   '#DADAE8'

  indexed_colors:
    - { index: 16, color: '#F2CECF' }
    - { index: 17, color: '#3E4058' }

