env:
  TERM: xterm-256color

window:
  dimensions:
    columns: 120
    lines: 30
  padding:
    x: 10
    y: 10

  dynamic_padding: true
  decorations: full
  title: Alacritty
  dynamic_title: false
  opacity: 0.97

scrolling:
  history: 10000
  multiplier: 3

font:
  normal:
    family: JetBrainsMono Nerd Font
    style: Medium

  bold:
    family: JetBrainsMono Nerd Font
    style: Bold

  italic:
    family: JetBrainsMono Nerd Font
    style: Italic

  size: 13

  offset:
    x: 0
    y: 2

draw_bold_text_with_bright_colors: true

cursor:
  style: Block
  blinking: Off
  blink_interval: 0
  unfocused_hollow: true
  custom_cursor_colors: true

mouse:
  hide_when_typing: true

