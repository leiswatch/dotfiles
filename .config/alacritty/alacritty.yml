env:
  TERM: xterm-256color

window:
  dimensions:
    columns: 140
    lines: 40
  padding:
    x: 5
    y: 5

  dynamic_padding: true
  decorations: full
  title: Alacritty
  dynamic_title: false

scrolling:
  history: 10000
  multiplier: 3

font:
  normal:
    family: SauceCodePro Nerd Font Mono
    style: Medium

  bold:
    family: SauceCodePro Nerd Font Mono
    style: Bold

  italic:
    family: SauceCodePro Nerd Font Mono
    style: Italic

  size: 14.0

  offset:
    x: 0
    y: 0

background_opacity: 0.97
draw_bold_text_with_bright_colors: true
cursor:
  # Cursor style
  #
  # Values for 'style':
  #   - ▇ Block
  #   - _ Underline
  #   - | Beam
  style: Block
  blinking: Off
  blink_interval: 0
  # If this is `true`, the cursor will be rendered as a hollow box when the
  # window is not focused.
  unfocused_hollow: true

