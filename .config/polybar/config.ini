[global/wm]
include-file = $HOME/.config/polybar/colors.ini
include-file = $HOME/.config/polybar/modules.ini

[bar/bar1]
width = 100%
height = 35px
radius = 0

; dpi = 96

background = ${colors.bg}
foreground = ${colors.fg}

line-size = 3pt

border-bottom-size = 0pt
border-top-size = 5px
border-right-size = 10px
border-left-size = 10px
border-color = #00000000

padding-left = 0
padding-right = 1

module-margin-right = 1

separator = |
separator-foreground = ${colors.bg}

font-0 = JetBrainsMono Nerd Font:style=Medium:size=11;2
font-1 = FontAwesome6Free:style=Solid:size=10;4
font-2 = FontAwesome6Free:style=Regular:size=10;4
font-3 = FontAwesome6Brands:style=Regular:size=10;4

modules-left = menu i3
modules-center = time
modules-right = pulseaudio xkeyboard memory cpu wlan

cursor-click = pointer
cursor-scroll = ns-resize

enable-ipc = true

tray-position = right

; wm-restack = generic
; wm-restack = bspwm
wm-restack = i3

; override-redirect = true

[module/filesystem]
type = internal/fs
interval = 25

mount-0 = /

label-mounted = %{F#F0C674}%mountpoint%%{F-} %percentage_used%%

label-unmounted = %mountpoint% not mounted
label-unmounted-foreground = ${colors.disabled}

[module/pulseaudio]
type = internal/pulseaudio

format-volume-foreground = ${colors.green}
format-volume = <ramp-volume><label-volume>

label-volume = %percentage%%
label-muted = Muted
format-muted-foreground = ${colors.red}
format-muted-prefix = ﱝ
format-muted-prefix-padding = 1

ramp-volume-0 = 奄
ramp-volume-1 = 奄
ramp-volume-2 = 奔
ramp-volume-3 = 奔
ramp-volume-4 = 墳
ramp-volume-5 = 墳
ramp-volume-6 = 墳
ramp-volume-padding = 1

[module/memory]
type = internal/memory
interval = 2
format-prefix = " "
format-prefix-foreground = ${colors.magenta}
label = %percentage_used%%
label-foreground = ${colors.magenta}

[module/cpu]
type = internal/cpu
interval = 3
format-prefix = " "
format-prefix-foreground = ${colors.red}
label-foreground = ${colors.red}
label = %percentage%%

[network-base]
type = internal/network
interval = 5
format-connected = <label-connected>
format-disconnected = <label-disconnected>
label-disconnected = %{F#F0C674}%ifname%%{F#707880} disconnected

[module/wlan]
inherit = network-base
interface-type = wireless
format-connected = <ramp-signal> <label-connected>
; label-connected = %{F#F0C674}%ifname%%{F-} %essid%
label-connected = %signal%%
label-disconnected = disconnected
format-connected-foreground = ${colors.yellow}
ramp-signal-padding-right = 1
ramp-signal-padding-left = 0
label-padding = 0

ramp-signal-0 = 
ramp-signal-1 = 
ramp-signal-2 = 
ramp-signal-3 = 
ramp-signal-4 = 
ramp-signal-5 = 

[module/eth]
inherit = network-base
interface-type = wired
label-connected = %{F#F0C674}%ifname%%{F-} %local_ip%

[module/date]
type = internal/date
interval = 1

date = %d-%m-%Y
label = %date%
label-foreground = ${colors.fg}

[module/time]
type = internal/date
interval = 1
date = %b, %a %y | %H:%M
label = %date%
label-foreground = ${colors.fg}

[settings]
screenchange-reload = true
pseudo-transparency = true

; vim:ft=dosini
